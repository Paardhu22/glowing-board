<!DOCTYPE html>
<html>
<head>
  <title>Glowing Pen</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    body { margin: 0; background: #050000; overflow: hidden; font-family: 'Inter', sans-serif; }
    video { display: none; }
    canvas { width: 100%; height: 100%; transform: scaleX(-1); position: absolute; z-index: 1; }
    
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    #indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      background: #444;
      border-radius: 50%;
      margin-right: 10px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    
    #indicator.active {
      background: #FF3131;
      box-shadow: 0 0 15px #FF3131;
    }
    
    .btn {
      margin-top: 10px;
      padding: 8px 16px;
      background: rgba(255, 49, 49, 0.2);
      border: 1px solid #FF3131;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .btn:hover {
      background: rgba(255, 49, 49, 0.4);
    }
    
    .shortcut {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div><span id="indicator"></span> <span id="status">READY</span></div>
    <div class="shortcut">Hold <span style="color: #FF3131; font-weight: bold;">CTRL</span> to Draw</div>
    <button class="btn" onclick="clearCanvas()">Clear Canvas</button>
    <div class="shortcut">Shortcut: Spacebar</div>
  </div>
  <video id="vid"></video>
  <canvas id="c"></canvas>
  <script>
    var vid = document.getElementById('vid');
    var c = document.getElementById('c');
    var ctx = c.getContext('2d');
    var arr = []; // Completed strokes
    var cur = []; // Current stroke
    var isDrawing = false;
    var drawTransition = false;
    var sx = null;
    var sy = null;

    function clearCanvas() {
      arr = [];
      cur = [];
    }

    window.onkeydown = function(e) {
      if (e.key == 'Control') {
        isDrawing = true;
        document.getElementById('indicator').classList.add('active');
        document.getElementById('status').innerText = 'DRAWING';
      }
      if (e.code == 'Space') clearCanvas();
    }
    
    window.onkeyup = function(e) {
      if (e.key == 'Control') {
        isDrawing = false;
        document.getElementById('indicator').classList.remove('active');
        document.getElementById('status').innerText = 'READY';
      }
    }

    function run(res) {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
      
      // Draw camera frame with a darker, red-tinted overlay for better glow
      ctx.drawImage(res.image, 0, 0, c.width, c.height);
      ctx.fillStyle = 'rgba(10, 0, 0, 0.88)';
      ctx.fillRect(0, 0, c.width, c.height);

      // Setup Glow Brush Styling
      ctx.shadowColor = '#FF3131';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#FF3131';
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Draw all saved strokes
      for (var i = 0; i < arr.length; i++) {
        ctx.beginPath();
        for (var j = 0; j < arr[i].length; j++) {
          if (j == 0) ctx.moveTo(arr[i][j].x, arr[i][j].y);
          else ctx.lineTo(arr[i][j].x, arr[i][j].y);
        }
        ctx.stroke();
      }

      if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        var lm = res.multiHandLandmarks[0];
        
        // Draw Subtle Hand Tracking
        drawConnectors(ctx, lm, HAND_CONNECTIONS, {color: 'rgba(255, 49, 49, 0.15)', lineWidth: 1.5});
        drawLandmarks(ctx, lm, {color: 'rgba(255, 255, 255, 0.4)', lineWidth: 1, radius: 2});

        // Tip of the index finger (Point 8)
        var ind = lm[8];
        var rx = ind.x * c.width;
        var ry = ind.y * c.height;

        // Exponential smoothing (Lerp) for a cleaner hand following
        if (sx == null) {
          sx = rx; 
          sy = ry;
        } else {
          sx += (rx - sx) * 0.35; // Smoother tracking (from 0.45 down to 0.35)
          sy += (ry - sy) * 0.35;
        }

        // Draw Cursor
        ctx.beginPath();
        ctx.arc(sx, sy, 8, 0, 2 * Math.PI);
        if (isDrawing) { 
          ctx.fillStyle = '#FFFFFF'; 
          ctx.shadowBlur = 25;
        } else { 
          ctx.fillStyle = 'rgba(255, 49, 49, 0.6)'; 
          ctx.shadowBlur = 10;
        }
        ctx.fill();

        // Handle Drawing Logic
        if (isDrawing) {
          if (!drawTransition) {
            drawTransition = true;
            cur = [];
            arr.push(cur);
          }
          cur.push({x: sx, y: sy});
        } else {
          drawTransition = false;
        }
      } else {
        drawTransition = false;
        sx = null;
      }
    }

    var h = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });
    
    h.setOptions({ 
      maxNumHands: 1, 
      modelComplexity: 1, 
      minDetectionConfidence: 0.6, // Slightly higher for better stability
      minTrackingConfidence: 0.6 
    });
    
    h.onResults(run);

    var cam = new Camera(vid, {
      onFrame: async () => { await h.send({image: vid}); },
      width: 1280, 
      height: 720
    });
    
    cam.start();
  </script>
</body>
</html>
